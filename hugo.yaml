baseURL: "https://sail-x.github.io/"
locale: en-us
defaultContentLanguage: en
title: "Saile | AI Governance & Cybersecurity"
theme: PaperMod

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  category: categories
  tag: tags
  series: series

menu:
  main:
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 10
    - identifier: about
      name: About
      url: /about/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40

params:
  env: production
  description: "Writing on AI governance, cybersecurity, and cross-border technology compliance."
  author: "Saile"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "Saile"
    Content: "Writing on AI governance, cybersecurity, and cross-border technology compliance."

  socialIcons:
    - name: github
      url: "https://github.com/sail-x"
    - name: rss
      url: "/index.xml"

  assets:
    disableHLJS: true

markup:
  goldmark:
    extensions:
      typographer: false
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: true
    noClasses: false
    style: github
